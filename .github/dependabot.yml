version: 2
updates:
  # Rust crate dependencies.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor

  # GitHub Actions referenced in .github/workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
