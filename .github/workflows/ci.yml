name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Scan Cargo.lock against the RustSec advisory database. Fails on any
  # known CVE in a transitive dependency. Dependabot opens PRs to upgrade;
  # this guard makes sure we don't merge new deps that already ship a CVE.
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Fast gate: formatting and lint before spending time on compilation.
  # Matrix on both OSes so macOS-only code (e.g. src/health/macos.rs,
  # cfg-gated under target_os = "macos") gets linted too — ubuntu clippy
  # silently skips that code.
  check:
    name: Format & Lint / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # Unit + integration tests on both target platforms.
  test:
    name: Test / ${{ matrix.os }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Run tests several times so parallel-test-isolation flakes are likelier
      # to surface in CI. A single run of a 20%-flake test passes 80% of the
      # time; 5 runs drop that to ~33%.
      - name: Run tests (5x for flake detection)
        run: |
          set -e
          for i in 1 2 3 4 5; do
            echo "::group::cargo test run $i/5"
            cargo test
            echo "::endgroup::"
          done

  # Build under the Nix sandbox. Catches environment-specific issues that
  # plain cargo test on a GitHub runner can miss (different scheduling,
  # missing system deps, sandbox paths). The Nix sandbox is the environment
  # downstream consumers actually use to build chevron via the flake.
  nix-build:
    name: Nix Build / ${{ matrix.os }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # `nix flake check` evaluates all flake outputs (incl. cross-system) and
      # runs the formatter check before we commit to a full build. Catches
      # eval errors and `.nix` formatting drift independent of the build.
      - name: Nix flake check
        run: nix flake check --print-build-logs
      - name: Nix build
        run: nix build --print-build-logs

  # Build release binaries and publish a GitHub Release on version tags.
  release:
    name: Release / ${{ matrix.target }}
    needs: [test, nix-build]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: chevron-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: chevron-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: chevron-macos-aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/chevron ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
